name: Build Pe Traseu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build APK cu imaginea oficiala Kivy
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/client:/home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PeTraseu-debug-apk
          path: client/bin/*.apk
          retention-days: 30
