name: Build Pe Traseu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout cod
        uses: actions/checkout@v3

      - name: Setează Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalează dependențe sistem
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential

      - name: Instalează Buildozer și Cython
        run: pip install buildozer==1.5.0 cython==0.29.37

      - name: Cache Android SDK/NDK
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r25b
          key: android-sdk-ndk-v1

      - name: Compilează APK
        working-directory: client
        run: yes | buildozer android debug 2>&1

      - name: Urcă APK
        uses: actions/upload-artifact@v3
        with:
          name: PeTraseu-debug-apk
          path: client/bin/*.apk
          retention-days: 30
