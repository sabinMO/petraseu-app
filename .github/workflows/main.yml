name: Build Pe Traseu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Dependente sistem
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential

      - name: Instaleaza Buildozer si p4a
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.37
          pip install "python-for-android==2023.09.16"

      - name: Accepta licente SDK
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.3" "platforms;android-33" "platform-tools" 2>/dev/null || true
          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          sudo ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager 2>/dev/null || true

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-ndk25b-v9

      - name: Curata build vechi
        run: rm -rf client/.buildozer

      - name: Build APK
        working-directory: client
        run: yes | buildozer android debug 2>&1 | tee /tmp/build.log

      - name: Verifica APK
        if: always()
        run: |
          echo "=== BIN FOLDER ==="
          ls -la client/bin/ 2>/dev/null || echo "Nu exista client/bin/"
          echo "=== ULTIMELE 50 LINII BUILD ==="
          tail -50 /tmp/build.log

      - name: Arata ultimele erori
        if: always()
        run: |
          echo "=== ULTIMELE ERORI ==="
          grep -E "\[ERROR\]|\[CRITICAL\]|Error:|error:|Traceback|FAILED" /tmp/build.log | grep -v "^#\|evdev\|gevent\|aubio\|secp\|vlc" | tail -100

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PeTraseu-debug-apk
          path: client/bin/*.apk
          retention-days: 30
