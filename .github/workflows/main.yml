name: Build Pe Traseu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build APK cu Docker Kivy
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          workdir: client
          buildozer_version: stable

      - name: Urca APK
        uses: actions/upload-artifact@v4
        with:
          name: PeTraseu-debug-apk
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30
