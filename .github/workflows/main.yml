name: Build Pe Traseu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Pregateste SDK pentru Docker
        run: |
          SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p "$SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
          unzip -o -q /tmp/cmdline-tools.zip -d /tmp/ct
          mv /tmp/ct/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          mkdir -p "$SDK_ROOT/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_ROOT/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$SDK_ROOT/licenses/android-sdk-license"
          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses || true
          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" \
            "platforms;android-33" \
            "build-tools;33.0.3" \
            "platform-tools" || true
          mkdir -p "$SDK_ROOT/tools/bin"
          ln -sf "$SDKMANAGER" "$SDK_ROOT/tools/bin/sdkmanager"

      - name: Build APK in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/client:/home/user/hostcwd \
            -v $HOME/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pe-traseu-apk
          path: |
            client/bin/*.apk
