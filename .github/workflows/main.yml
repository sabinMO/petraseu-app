name: Build Pe Traseu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Build APK in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/client:/home/user/hostcwd \
            -e ANDROIDSDK=/home/user/.buildozer/android/platform/android-sdk \
            kivy/buildozer:latest \
            sh -c "yes | sdkmanager --licenses > /dev/null 2>&1 || true && buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pe-traseu-apk
          path: |
            client/bin/*.apk
