name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('client/buildozer.spec') }}

      - name: Build APK
        id: buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          workdir: client
          command: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pe-traseu-apk
          path: ${{ steps.buildozer.outputs.filename }}
